<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="50%" stop-color="#0f1115"/>
      <stop offset="100%" stop-color="#161a22"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1" fill="#00AEEF" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#g)"/>
  <rect width="800" height="600" fill="url(#dots)"/>
  <g transform="translate(400 300)" opacity="0.25">
    <circle r="60" fill="none" stroke="#00AEEF" stroke-width="1.5"/>
    <circle r="40" fill="none" stroke="#00AEEF" stroke-width="1"/>
    <text text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="14" font-weight="600" opacity="0.5">KIT FACTORY</text>
